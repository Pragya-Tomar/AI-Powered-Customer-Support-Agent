<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .bot-info h3 { font-size: 16px; font-weight: 600; }
        .bot-info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.bot {
            background: #f0f2f5;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: #f0f2f5;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.show { display: flex; }

        .dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 10px;
        }

        .quick-reply {
            background: white;
            border: 1.5px solid #667eea;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #667eea;
            color: white;
        }

        .chat-input {
            padding: 16px 20px;
            border-top: 1px solid #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input input {
            flex: 1;
            border: 1.5px solid #e0e0e0;
            border-radius: 25px;
            padding: 10px 18px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: #667eea; }

        .send-btn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="bot-avatar">🤖</div>
        <div class="bot-info">
            <h3>EduSupport AI</h3>
            <p><span class="online-dot"></span>Online · Typically replies instantly</p>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            👋 Hi! I'm EduSupport AI. I can help you with course issues, login problems, payments, and more!
            <div class="message-time">Just now</div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="quick-replies">
        <button class="quick-reply" onclick="sendQuick('Course not loading')">📚 Course not loading</button>
        <button class="quick-reply" onclick="sendQuick('unable to login')">🔐 Can't login</button>
        <button class="quick-reply" onclick="sendQuick('Payment failed')">💳 Payment failed</button>
        <button class="quick-reply" onclick="sendQuick('Video buffering')">🎥 Video buffering</button>
        <button class="quick-reply" onclick="sendQuick('I want a refund')">💰 Refund</button>
        <button class="quick-reply" onclick="sendQuick('forgot password')">🔑 Forgot password</button>
        <button class="quick-reply" onclick="sendQuick('certificate not received')">🎓 Certificate</button>
        <button class="quick-reply" onclick="sendQuick('discount')">🏷️ Discount</button>
        <button class="quick-reply" onclick="sendQuick('app crashing')">📱 App crashing</button>
        <button class="quick-reply" onclick="sendQuick('download')">⬇️ Download issue</button>
        <button class="quick-reply" onclick="sendQuick('subscription')">🔄 Subscription</button>
        <button class="quick-reply" onclick="sendQuick('change email')">📧 Change email</button>
        <button class="quick-reply" onclick="sendQuick('platform is slow')">🐢 Platform slow</button>
    </div>

    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type your message..." 
               onkeypress="if(event.key==='Enter') sendMessage()"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    function getTime() {
        return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function addMessage(text, sender) {
        const messages = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = text + `<div class="message-time">${getTime()}</div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        document.getElementById('typingIndicator').classList.add('show');
    }

    function hideTyping() {
        document.getElementById('typingIndicator').classList.remove('show');
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        input.value = '';
        showTyping();

        try {
            const response = await fetch('/api/chat/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            hideTyping();
            addMessage(data.response, 'bot');
        } catch (error) {
            hideTyping();
            addMessage('Sorry, something went wrong. Please try again.', 'bot');
        }
    }

    function sendQuick(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
    }
</script>
</body>
</html>
